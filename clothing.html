<script>

function changeSlide(direction, button) {

  const slider = button.parentElement;
  const image = slider.querySelector(".slider-image");

  const images = JSON.parse(image.dataset.images);

  let index = parseInt(image.dataset.index);

  index += direction;

  if (index < 0) {
    index = images.length - 1;
  }

  if (index >= images.length) {
    index = 0;
  }

  image.src = images[index];
  image.dataset.index = index;

}

let currentImages = [];
let currentIndex = 0;

/* OPEN POPUP */

function openGallery(element) {

  currentImages = JSON.parse(element.dataset.images);

  currentIndex = 0;

  document.getElementById("galleryImage").src =
    currentImages[currentIndex];

  document.getElementById("galleryModal").style.display = "flex";
}

/* CLOSE POPUP */

function closeGallery() {

  document.getElementById("galleryModal").style.display = "none";
}

/* CHANGE IMAGE */

function changeGallery(direction) {

  currentIndex += direction;

  if (currentIndex < 0) {
    currentIndex = currentImages.length - 1;
  }

  if (currentIndex >= currentImages.length) {
    currentIndex = 0;
  }

  document.getElementById("galleryImage").src =
    currentImages[currentIndex];
}

</script>
